kind = "web"
previewPath = "/"
title = "Ozerli"
version = "1.0.0"
id = "artifacts/trustdesk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20392

[services.development]
run = "pnpm --filter @workspace/ozerli run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ozerli", "run", "build" ]
publicDir = "artifacts/trustdesk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20392"
BASE_PATH = "/"
